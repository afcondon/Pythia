name: purescript-python
version: "0.0.2"
synopsis: PureScript Programming Language Python Back-end
description:
  Python backend for PureScript. Consumes CoreFn JSON (purs --codegen corefn)
  and emits Python source - one Python module per PureScript module plus a
  small runtime. Sibling of purescript-julia (Jurist) in the
  polyglot-PureScript backends effort; rebooted on the Jurist architecture
  per docs/design-decisions/0001.
category: Language
author: Andrew Condon
copyright: (c) 2026 Andrew Condon
license: BSD3
github: afcondon/purescript-python
extra-source-files:
  - stack.yaml
  - README.md
dependencies:
  - aeson
  - base
  - containers
  - directory
  - filepath
  - Glob
  - mtl
  - purescript
  - text
  - transformers
build-tools:
  - happy:happy ==1.20.0

library:
  source-dirs: src
  ghc-options: -Wall -O2

executables:
  purepy:
    main: Main.hs
    source-dirs: app
    ghc-options: -Wall -O2 -fno-warn-unused-do-bind -threaded -rtsopts -with-rtsopts=-N
    dependencies:
      - purescript-python

default-extensions:
  - ConstraintKinds
  - DataKinds
  - DeriveFunctor
  - DeriveFoldable
  - DeriveTraversable
  - DeriveGeneric
  - DerivingStrategies
  - EmptyDataDecls
  - FlexibleContexts
  - KindSignatures
  - LambdaCase
  - MultiParamTypeClasses
  - NoImplicitPrelude
  - PatternGuards
  - PatternSynonyms
  - RankNTypes
  - RecordWildCards
  - OverloadedStrings
  - ScopedTypeVariables
  - TupleSections
  - ViewPatterns

stability: experimental
